<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGaze — Sessions enregistrées</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="src/barchart/barchart.css" />
  <link rel="stylesheet" href="src/linechart/linechart.css" />
  <link rel="stylesheet" href="src/scatterchart/scatterchart.css" />
  <style>
    :root { --bg:#0f0f1a; --panel:#16213e; --accent:#4ecdc4; --accent2:#6c8cff; --text:#eee; --muted:#9aa6c0; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:'Segoe UI',Arial,sans-serif; }
    header { padding:14px 22px; display:flex; align-items:center; gap:14px; border-bottom:1px solid rgba(120,140,200,0.18); }
    header h1 { font-size:1.1rem; margin:0; } header a { color:var(--muted); text-decoration:none; font-size:.85rem; }
    .bar { padding:12px 22px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; border-bottom:1px solid rgba(120,140,200,.12); }
    button { background:var(--accent2); color:#fff; border:none; border-radius:8px; padding:9px 15px; cursor:pointer; font-size:.85rem; }
    button.ghost { background:transparent; border:1px solid rgba(120,140,200,.4); color:var(--text); }
    button.danger { background:#e74c3c; }
    .wrap { padding:18px 22px; }
    table { width:100%; border-collapse:collapse; font-size:.86rem; }
    th, td { padding:8px 10px; text-align:left; border-bottom:1px solid rgba(120,140,200,.14); }
    th { color:var(--accent); font-weight:600; cursor:default; }
    tr.sel { background:rgba(108,140,255,.12); }
    tr.row:hover { background:rgba(120,140,200,.08); cursor:pointer; }
    .muted { color:var(--muted); }
    .empty { color:var(--muted); padding:40px; text-align:center; }
    /* Panneau détail */
    #detail { margin-top:24px; display:none; }
    #detail.on { display:block; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 24px; background:var(--panel); border-radius:12px; padding:16px 20px; font-size:.88rem; }
    .detail-grid b { color:var(--accent); }
    .viz-row { display:flex; gap:16px; flex-wrap:wrap; margin-top:18px; }
    .viz-box { background:#0d1424; border:1px solid rgba(120,140,200,.2); border-radius:12px; padding:12px; }
    .viz-box h3 { margin:0 0 8px; font-size:.92rem; color:var(--accent); }
    #cmp { color:var(--muted); font-size:.82rem; }
  </style>
</head>
<body>
  <header>
    <h1>WebGaze — Sessions de test enregistrées</h1>
    <a href="choose.html" style="margin-left:auto;">← Accueil</a>
    <a href="test-session.html">+ Nouvelle session</a>
  </header>

  <div class="bar">
    <span style="color:var(--muted);font-size:.82rem;">Filtrer :</span>
    <select id="f-engine" class="ghost" style="padding:8px 10px;border-radius:8px;">
      <option value="">Moteur : tous</option>
      <option value="webgazer">WebGazer</option>
      <option value="mediapipe">MediaPipe</option>
    </select>
    <select id="f-glasses" class="ghost" style="padding:8px 10px;border-radius:8px;">
      <option value="">Lunettes : tous</option>
      <option value="non">Sans lunettes</option>
      <option value="lunettes">Lunettes</option>
      <option value="lentilles">Lentilles</option>
    </select>
    <span id="count" class="muted"></span>
    <span style="flex:1"></span>
    <button id="btn-cmp-sel" class="ghost" disabled>Comparer la sélection (0)</button>
    <button id="btn-cmp-grp" class="ghost">Comparer WebGazer ↔ MediaPipe</button>
    <button id="btn-export" class="ghost">Exporter tout</button>
    <label class="ghost" style="padding:9px 15px;border:1px solid rgba(120,140,200,.4);border-radius:8px;cursor:pointer;">
      Importer… <input id="imp" type="file" accept=".json" style="display:none;">
    </label>
    <button id="btn-clear" class="danger">Tout supprimer</button>
  </div>

  <!-- Overlay de comparaison -->
  <div id="cmp-overlay" style="position:fixed;inset:0;z-index:100000;background:#0d1424;color:#eee;display:none;flex-direction:column;font-family:Arial,sans-serif;">
    <div style="padding:14px 22px;border-bottom:1px solid rgba(120,140,200,.2);display:flex;align-items:center;gap:14px;">
      <b style="color:#6c8cff;font-size:1.05rem;">Comparaison de sessions</b>
      <span style="flex:1"></span>
      <button id="cmp-close" style="background:#6c8cff;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;">Fermer ✕</button>
    </div>
    <div id="cmp-body" style="flex:1;overflow:auto;padding:22px;"></div>
  </div>

  <div class="wrap">
    <div id="list"></div>

    <div id="detail">
      <h2 style="margin:18px 0 10px;">Détail de la session</h2>
      <div class="detail-grid" id="detail-grid"></div>
      <div class="viz-row">
        <div class="viz-box" style="flex:1;min-width:320px;">
          <h3>Chronologie (fixations / saccades / stimuli)</h3>
          <svg id="timeline" width="100%" height="170"></svg>
        </div>
      </div>
      <div class="viz-row">
        <button id="btn-fullviz" style="background:#6c8cff;font-weight:700;padding:12px 20px;">📊 Voir les 3 pages avec la heatmap (résultats détaillés)</button>
        <button id="btn-dl-json" class="ghost">Télécharger JSON</button>
        <button id="btn-dl-csv" class="ghost">Télécharger CSV</button>
        <button id="btn-del" class="danger">Supprimer cette session</button>
        <span id="cmp"></span>
      </div>
    </div>
  </div>

  <script src="src/calibration/calibration.js?v=3"></script>
  <script src="src/logger/gaze-logger.js?v=3"></script>
  <script src="src/session-store/session-store.js?v=3"></script>
  <script src="src/gaze-viz/gaze-viz.js?v=3"></script>
  <script src="src/barchart/barchart.js?v=3"></script>
  <script src="src/linechart/linechart.js?v=3"></script>
  <script src="src/scatterchart/scatterchart.js?v=3"></script>
  <script src="src/results-view/results-view.js?v=3"></script>
  <script src="src/compare/compare.js?v=3"></script>

  <script>
  (function () {
    'use strict';
    var _selId = null;
    var _sortKey = 'start_time', _sortDir = -1; // tri courant
    var _checked = {};                            // sessions cochées (id → true)

    function fmt(v, suffix){ return (v==null||v==='') ? '—' : (v + (suffix||'')); }

    // Colonnes triables : clé de tri (dans summary) + libellé.
    var COLS = [
      { key:'start_time',     label:'Date' },
      { key:'participant',    label:'Participant' },
      { key:'glasses',        label:'Lunettes' },
      { key:'engine',         label:'Moteur' },
      { key:'calib_error_px', label:'Calib. (px)' },
      { key:'lux',            label:'Lux' },
      { key:'mean_confidence',label:'Conf.' },
      { key:'n_points',       label:'Points' },
      { key:'n_fixations',    label:'Fix' },
      { key:'n_saccades',     label:'Sacc' },
    ];

    // Applique filtres + tri et renvoie la liste filtrée/triée.
    function filteredRows() {
      var fe = document.getElementById('f-engine').value;
      var fg = document.getElementById('f-glasses').value;
      var rows = SessionStore.list().filter(function (r) {
        var s = r.summary;
        if (fe && s.engine !== fe) return false;
        if (fg && s.glasses !== fg) return false;
        return true;
      });
      rows.sort(function (a, b) {
        var va = a.summary[_sortKey], vb = b.summary[_sortKey];
        if (va == null) va = (typeof vb === 'number') ? -Infinity : '';
        if (vb == null) vb = (typeof va === 'number') ? -Infinity : '';
        var cmp = (typeof va === 'number' && typeof vb === 'number')
          ? (va - vb) : String(va).localeCompare(String(vb));
        return cmp * _sortDir;
      });
      return rows;
    }

    function renderList() {
      var rows = filteredRows();
      var total = SessionStore.count();
      document.getElementById('count').textContent = rows.length + ' / ' + total + ' session(s)';
      var el = document.getElementById('list');
      if (!total) { el.innerHTML = '<div class="empty">Aucune session. Lancez une <a href="index.html" style="color:#4ecdc4">session de test</a>.</div>'; return; }
      if (!rows.length) { el.innerHTML = '<div class="empty">Aucune session ne correspond aux filtres.</div>'; return; }

      var arrow = function (k) { return _sortKey===k ? (_sortDir<0?' ▼':' ▲') : ''; };
      var html = '<table><thead><tr><th style="width:30px;"></th>';
      COLS.forEach(function (c) { html += '<th data-sort="' + c.key + '" style="cursor:pointer;">' + c.label + arrow(c.key) + '</th>'; });
      html += '</tr></thead><tbody>';
      rows.forEach(function (r) {
        var s = r.summary;
        html += '<tr class="row' + (r.id===_selId?' sel':'') + '" data-id="' + r.id + '">'
          + '<td><input type="checkbox" class="cmp-cb" data-id="' + r.id + '"' + (_checked[r.id]?' checked':'') + '></td>'
          + '<td>' + fmt(s.date) + '</td>'
          + '<td>' + fmt(s.participant) + '</td>'
          + '<td>' + fmt(s.glasses) + '</td>'
          + '<td>' + fmt(s.engine) + '</td>'
          + '<td>' + fmt(s.calib_error_px) + '</td>'
          + '<td>' + fmt(s.lux) + '</td>'
          + '<td>' + fmt(s.mean_confidence) + '</td>'
          + '<td>' + fmt(s.n_points) + '</td>'
          + '<td>' + fmt(s.n_fixations) + '</td>'
          + '<td>' + fmt(s.n_saccades) + '</td>'
          + '</tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;
      // Tri au clic sur l'en-tête.
      el.querySelectorAll('th[data-sort]').forEach(function (th) {
        th.addEventListener('click', function () {
          var k = th.getAttribute('data-sort');
          if (_sortKey === k) _sortDir = -_sortDir; else { _sortKey = k; _sortDir = 1; }
          renderList();
        });
      });
      // Clic sur une ligne = sélectionner (sauf sur la checkbox).
      el.querySelectorAll('tr.row').forEach(function (tr) {
        tr.addEventListener('click', function (e) {
          if (e.target && e.target.classList.contains('cmp-cb')) return;
          selectSession(tr.getAttribute('data-id'));
        });
      });
      // Cases à cocher pour la comparaison.
      el.querySelectorAll('.cmp-cb').forEach(function (cb) {
        cb.addEventListener('change', function () {
          var id = cb.getAttribute('data-id');
          if (cb.checked) _checked[id] = true; else delete _checked[id];
          _updateCompareBtn();
        });
      });
    }

    function _updateCompareBtn() {
      var n = Object.keys(_checked).length;
      var b = document.getElementById('btn-cmp-sel');
      b.textContent = 'Comparer la sélection (' + n + ')';
      b.disabled = (n !== 2);
    }

    function selectSession(id) {
      _selId = id;
      renderList();
      var data = SessionStore.get(id);
      if (!data) return;
      var s = SessionStore.summarize(data);
      var sess = data.session || {};
      document.getElementById('detail').classList.add('on');
      document.getElementById('detail-grid').innerHTML =
        '<div><b>Participant</b> : ' + fmt(s.participant) + '</div>'
        + '<div><b>Date / heure</b> : ' + fmt((sess.start_time||'').replace('T',' ').slice(0,19)) + '</div>'
        + '<div><b>Lunettes</b> : ' + fmt(s.glasses) + '</div>'
        + '<div><b>Moteur</b> : ' + fmt(s.engine) + '</div>'
        + '<div><b>Erreur calibration</b> : ' + fmt(s.calib_error_px,' px') + '</div>'
        + '<div><b>Luminosité médiane</b> : ' + fmt(s.lux,' lux') + '</div>'
        + '<div><b>Confiance moyenne</b> : ' + fmt(s.mean_confidence) + '</div>'
        + '<div><b>Résolution écran</b> : ' + (sess.screen_resolution ? sess.screen_resolution.width+'×'+sess.screen_resolution.height : '—') + '</div>'
        + '<div><b>Points / Fixations / Saccades</b> : ' + s.n_points + ' / ' + s.n_fixations + ' / ' + s.n_saccades + '</div>'
        + '<div><b>Hits AOI</b> : ' + fmt(s.n_aoi_hits) + '</div>';
      drawTimeline(data);
      document.getElementById('cmp').textContent = '';
    }

    // Chronologie D3 : fixations (vert), saccades (bleu), stimuli (rouge).
    function drawTimeline(data) {
      var svg = d3.select('#timeline'); svg.selectAll('*').remove();
      var W = document.getElementById('timeline').clientWidth || 600, H = 170;
      var events = (data.events||[]);
      var inters = (data.interactions||[]).filter(function(i){ return i.type==='stimulus_shown'; });
      var tMax = d3.max(events, function(e){ return e.end_time; }) || 1;
      var tMin = d3.min(events, function(e){ return e.start_time; }) || 0;
      // Convertir en t_rel via raw si possible, sinon utiliser start/end bruts.
      var x = d3.scaleLinear().domain([tMin, tMax]).range([40, W-20]);
      // Axe
      svg.append('g').attr('transform','translate(0,'+(H-24)+')')
        .call(d3.axisBottom(x).ticks(6).tickFormat(function(d){ return ((d-tMin)/1000).toFixed(0)+'s'; }))
        .selectAll('text').style('fill','#9aa6c0');
      // Stimuli (bandes rouges) — approximées sur la timeline via leur ordre.
      events.forEach(function (e) {
        var y = e.type==='fixation' ? 40 : 80;
        var col = e.type==='fixation' ? '#27ae60' : '#6c8cff';
        svg.append('rect')
          .attr('x', x(e.start_time)).attr('y', y)
          .attr('width', Math.max(2, x(e.end_time)-x(e.start_time))).attr('height', 22)
          .attr('rx',3).attr('fill', col).attr('opacity',0.8);
      });
      svg.append('text').attr('x',6).attr('y',54).style('fill','#27ae60').style('font-size','11px').text('Fix');
      svg.append('text').attr('x',6).attr('y',94).style('fill','#6c8cff').style('font-size','11px').text('Sacc');
    }

    // ── Actions ──
    document.getElementById('btn-export').addEventListener('click', function () {
      var blob = new Blob([JSON.stringify(SessionStore.exportAll(), null, 2)], { type:'application/json' });
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='webgaze_sessions_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
    });
    document.getElementById('imp').addEventListener('change', function (e) {
      var f=e.target.files[0]; if(!f) return;
      var rd=new FileReader();
      rd.onload=function(){ try{ var obj=JSON.parse(rd.result); var n=SessionStore.importAll(obj,true);
        alert(n+' session(s) importée(s).'); renderList(); }catch(err){ alert('Fichier invalide.'); } };
      rd.readAsText(f);
    });
    document.getElementById('btn-clear').addEventListener('click', function () {
      if (confirm('Supprimer TOUTES les sessions enregistrées ?')) { SessionStore.clear(); _selId=null;
        document.getElementById('detail').classList.remove('on'); renderList(); }
    });
    document.getElementById('btn-fullviz').addEventListener('click', function () {
      var d=SessionStore.get(_selId); if(d) ResultsView.show(d);
    });
    document.getElementById('btn-dl-json').addEventListener('click', function () {
      var d=SessionStore.get(_selId); if(!d) return;
      var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='session_'+(d.session.participant_id||'x')+'.json'; a.click();
    });
    document.getElementById('btn-dl-csv').addEventListener('click', function () {
      var d=SessionStore.get(_selId); if(!d) return;
      // Réutilise l'export CSV du logger en réimportant les données.
      var tmp = d; var rows = (tmp.raw_gaze_data||[]);
      var cols=['t_rel_ms','timestamp','x','y','confidence','lux','source_module','test_case_id','target_aoi_id'];
      var out=[cols.join(',')];
      rows.forEach(function(p){ out.push(cols.map(function(k){ return p[k]==null?'':p[k]; }).join(',')); });
      var blob=new Blob([out.join('\n')],{type:'text/csv'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='session_'+(d.session.participant_id||'x')+'.csv'; a.click();
    });
    document.getElementById('btn-del').addEventListener('click', function () {
      if (_selId && confirm('Supprimer cette session ?')) { SessionStore.delete(_selId); _selId=null;
        delete _checked[_selId]; document.getElementById('detail').classList.remove('on'); renderList(); }
    });

    // ── Filtres ──
    document.getElementById('f-engine').addEventListener('change', renderList);
    document.getElementById('f-glasses').addEventListener('change', renderList);

    // ── Comparaison : 2 sessions cochées ──
    document.getElementById('btn-cmp-sel').addEventListener('click', function () {
      var ids = Object.keys(_checked);
      if (ids.length !== 2) return;
      var a = SessionStore.get(ids[0]), b = SessionStore.get(ids[1]);
      var sa = SessionStore.summarize(a), sb = SessionStore.summarize(b);
      // Label distinct : nom + moteur + date/heure (pour différencier 2 sessions du même nom).
      function lbl(s, sess){ var t=(sess.session&&sess.session.start_time||'').replace('T',' ').slice(5,16);
        return s.participant + ' · ' + (s.engine||'?') + ' · ' + t; }
      showCompare(Compare.compare(a, b, lbl(sa, a), lbl(sb, b)));
    });

    // ── Comparaison : groupe WebGazer ↔ groupe MediaPipe (sur les sessions filtrées) ──
    document.getElementById('btn-cmp-grp').addEventListener('click', function () {
      var rows = filteredRows();
      var wg = rows.filter(function (r){ return r.summary.engine==='webgazer'; }).map(function (r){ return SessionStore.get(r.id); });
      var mp = rows.filter(function (r){ return r.summary.engine==='mediapipe'; }).map(function (r){ return SessionStore.get(r.id); });
      if (!wg.length || !mp.length) { alert('Il faut au moins une session WebGazer ET une MediaPipe (dans le filtre courant).'); return; }
      showCompare(Compare.compare(wg, mp, 'WebGazer (' + wg.length + ')', 'MediaPipe (' + mp.length + ')'));
    });

    // Affiche la comparaison : BILAN écrit en français d'abord, puis le tableau.
    function showCompare(cmp) {
      var ov = document.getElementById('cmp-overlay');
      var body = document.getElementById('cmp-body');
      function cell(val, unit){ return (val==null) ? '—' : (val + (unit?(' '+unit):'')); }
      function rowByKey(k){ return cmp.rows.find(function(r){ return r.key===k; }); }
      function nameOf(side){ return side==='A' ? cmp.labelA : cmp.labelB; }

      // ── 1. BILAN ÉCRIT (phrases simples) ──
      var aWins = cmp.rows.filter(function(r){return r.better==='A';}).length;
      var bWins = cmp.rows.filter(function(r){return r.better==='B';}).length;
      var winner = aWins===bWins ? null : (aWins>bWins ? 'A' : 'B');
      var verdictColor = '#6c8cff';
      var verdictTxt = winner==null
        ? '⚖️ Les deux sessions se valent globalement (' + aWins + ' critère(s) gagné(s) chacune).'
        : '🏆 ' + nameOf(winner) + ' est globalement meilleure (' + Math.max(aWins,bWins) + ' critères de qualité sur ' + (aWins+bWins||1) + ').';

      // Phrases détaillées sur les 3 critères clés.
      var phrases = [];
      var cal = rowByKey('calib_px');
      if (cal && cal.a!=null && cal.b!=null) {
        if (cal.a===cal.b) phrases.push('La précision de calibration est identique (' + cal.a + ' px).');
        else phrases.push('La calibration est plus précise pour <b>' + nameOf(cal.better) + '</b> ('
          + Math.min(cal.a,cal.b) + ' px contre ' + Math.max(cal.a,cal.b) + ' px) — plus c\'est bas, mieux c\'est.');
      }
      var ot = rowByKey('on_target');
      if (ot && ot.a!=null && ot.b!=null) {
        if (ot.a===ot.b) phrases.push('Le regard tombe aussi souvent sur les cibles dans les deux cas (' + ot.a + ' %).');
        else phrases.push('Le regard atteint mieux les cibles pour <b>' + nameOf(ot.better) + '</b> ('
          + Math.max(ot.a,ot.b) + ' % contre ' + Math.min(ot.a,ot.b) + ' %).');
      }
      var cf = rowByKey('confidence');
      if (cf && cf.a!=null && cf.b!=null && cf.a!==cf.b) {
        phrases.push('La confiance des prédictions est meilleure pour <b>' + nameOf(cf.better) + '</b> ('
          + Math.max(cf.a,cf.b) + ' contre ' + Math.min(cf.a,cf.b) + ').');
      }

      var html = '<div style="background:#16213e;border-radius:12px;padding:18px 22px;margin-bottom:22px;">'
        + '<div style="font-size:1.15rem;font-weight:700;color:' + verdictColor + ';margin-bottom:10px;">' + verdictTxt + '</div>'
        + '<ul style="margin:0;padding-left:20px;line-height:1.9;font-size:.95rem;color:#dfe6f5;">'
        + phrases.map(function(p){ return '<li>' + p + '</li>'; }).join('')
        + '</ul>'
        + '<div style="margin-top:12px;color:#9aa6c0;font-size:.8rem;">Comparaison sur ' + cmp.nA + ' vs ' + cmp.nB
        + ' session(s)' + (cmp.nA>1||cmp.nB>1 ? ' (valeurs = moyennes du groupe)' : '') + '.</div>'
        + '</div>';

      // ── 2. TABLEAU DÉTAILLÉ (badges clairs) ──
      html += '<h3 style="color:#4ecdc4;margin:0 0 8px;">Détail par métrique</h3>'
        + '<table style="width:100%;border-collapse:collapse;font-size:.92rem;">'
        + '<thead><tr style="color:#4ecdc4;text-align:left;">'
        + '<th style="padding:10px 12px;border-bottom:1px solid rgba(120,140,200,.25);">Métrique</th>'
        + '<th style="padding:10px 12px;border-bottom:1px solid rgba(120,140,200,.25);">' + cmp.labelA + '</th>'
        + '<th style="padding:10px 12px;border-bottom:1px solid rgba(120,140,200,.25);">' + cmp.labelB + '</th>'
        + '<th style="padding:10px 12px;border-bottom:1px solid rgba(120,140,200,.25);">Écart</th>'
        + '<th style="padding:10px 12px;border-bottom:1px solid rgba(120,140,200,.25);">Gagnant</th>'
        + '</tr></thead><tbody>';
      cmp.rows.forEach(function (r) {
        var aCol = r.better==='A' ? 'color:#27ae60;font-weight:700;' : '';
        var bCol = r.better==='B' ? 'color:#27ae60;font-weight:700;' : '';
        var badge;
        if (r.better==='A') badge = '<span style="background:#27ae60;color:#fff;padding:2px 9px;border-radius:999px;font-size:.78rem;">' + cmp.labelA + '</span>';
        else if (r.better==='B') badge = '<span style="background:#27ae60;color:#fff;padding:2px 9px;border-radius:999px;font-size:.78rem;">' + cmp.labelB + '</span>';
        else badge = '<span style="color:#9aa6c0;">égalité</span>';
        html += '<tr>'
          + '<td style="padding:8px 12px;border-bottom:1px solid rgba(120,140,200,.1);">' + r.label + (r.lowerBetter===true?' <span style="color:#9aa6c0;">(bas = mieux)</span>':r.lowerBetter===false?' <span style="color:#9aa6c0;">(haut = mieux)</span>':'') + '</td>'
          + '<td style="padding:8px 12px;border-bottom:1px solid rgba(120,140,200,.1);' + aCol + '">' + cell(r.a, r.unit) + '</td>'
          + '<td style="padding:8px 12px;border-bottom:1px solid rgba(120,140,200,.1);' + bCol + '">' + cell(r.b, r.unit) + '</td>'
          + '<td style="padding:8px 12px;border-bottom:1px solid rgba(120,140,200,.1);color:#9aa6c0;">' + (r.diff==null?'—':(r.diff>0?'+':'')+r.diff+(r.unit?(' '+r.unit):'')) + '</td>'
          + '<td style="padding:8px 12px;border-bottom:1px solid rgba(120,140,200,.1);">' + badge + '</td>'
          + '</tr>';
      });
      html += '</tbody></table>';
      body.innerHTML = html;
      ov.style.display = 'flex';
    }
    document.getElementById('cmp-close').addEventListener('click', function () {
      document.getElementById('cmp-overlay').style.display = 'none';
    });

    renderList();
  })();
  </script>
</body>
</html>
