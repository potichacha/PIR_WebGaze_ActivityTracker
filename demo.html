<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIR WebGaze — Démo</title>
  <script>
    (function patchScreenForWebGazer() {
      if (window.screen.width === window.innerWidth) return;
      try {
        Object.defineProperty(window, 'screen', {
          get: function () {
            return {
              width:       window.innerWidth,
              height:      window.innerHeight,
              availWidth:  window.innerWidth,
              availHeight: window.innerHeight,
              colorDepth:  24,
              pixelDepth:  24,
            };
          }
        });
      } catch (_) {}
    })();
  </script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.min.js"
    crossorigin="anonymous"
    onerror="document.getElementById('webcam-status').textContent='● WebGazer indisponible (hors ligne ?)'"
  ></script>
  <link rel="stylesheet" href="src/barchart/barchart.css" />
  <link rel="stylesheet" href="src/linechart/linechart.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; }

    #webcam-status { font-size: 13px; color: #f0a500; }

    nav {
      background: #fff;
      border-bottom: 2px solid #dde;
      display: flex;
      padding: 0 20px;
      flex-shrink: 0;
    }
    nav button {
      background: none;
      border: none;
      padding: 10px 18px;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    nav button.active { color: #2c3e50; font-weight: 600; border-bottom-color: #2c3e50; }
    nav button:hover:not(.active) { color: #2c3e50; }

    /* ── Chart area ── */
    #chart-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 10px;
    }

    .tab-panel { display: none; width: 100%; height: 100%; }
    .tab-panel.active { display: block; }

    .chart-wrapper {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      width: 100%;
      height: 100%;
      padding: 6px;
    }

    .placeholder {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 15px;
      border: 2px dashed #ddd;
    }

    /* ── Controls bar ── */
    #controls {
      background: #fff;
      border-top: 1px solid #dde;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #controls button {
      padding: 7px 16px;
      border: none;
      border-radius: 5px;
      background: #2c3e50;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    #controls button:disabled { opacity: 0.4; cursor: default; }
    #controls button:not(:disabled):hover { background: #3d5166; }
    #controls button.danger { background: #c0392b; }
    #controls button.danger:not(:disabled):hover { background: #e74c3c; }

    #cal-score {
      margin-left: auto;
      font-size: 12px;
      color: #555;
    }
    #cal-score span { font-weight: bold; color: #27ae60; }

    /* ── WebGazer video feed (coin bas-droite) ── */
    #webgazerVideoContainer {
      position: fixed !important;
      bottom: 12px !important;
      right: 12px !important;
      top: auto !important;
      left: auto !important;
      width: 160px !important;
      height: 120px !important;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(78,205,196,0.6);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      z-index: 9999;
    }
    #webgazerVideoFeed {
      width: 160px !important;
      height: 120px !important;
    }
    #webgazerFaceOverlay, #webgazerFaceFeedbackBox {
      width: 160px !important;
      height: 120px !important;
    }

    /* ── Gaze cursor (dot + dwell ring) ── */
    #gaze-cursor {
      position: fixed;
      pointer-events: none;
      display: none;
      z-index: 10000;
      /* centered on gaze point */
      transform: translate(-50%, -50%);
    }
    #gaze-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      background: rgba(231, 76, 60, 0.75);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px rgba(231,76,60,0.55);
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>PIR WebGaze — Prototype de démo</h1>
    <span id="webcam-status">● Webcam inactive</span>
  </header>

  <nav>
    <button class="active" data-tab="tab-barchart">Bar Chart</button>
    <button data-tab="tab-linechart">Line Chart</button>
    <button data-tab="tab-scatter">Scatter Plot</button>
  </nav>

  <div id="chart-area">
    <div id="tab-barchart"  class="tab-panel active">
      <div id="bar-chart-container" class="chart-wrapper"></div>
    </div>
    <div id="tab-linechart" class="tab-panel">
      <div id="line-chart-container" class="chart-wrapper"></div>
    </div>
    <div id="tab-scatter"   class="tab-panel">
      <div id="scatter-chart-container" class="placeholder">Scatter Plot — à intégrer (Dev 3)</div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-calibrate">Calibrer</button>
    <button id="btn-start">▶ Démarrer</button>
    <button id="btn-stop" disabled>■ Arrêter</button>
    <button id="btn-aois">Afficher AOI</button>
    <span id="cal-score"></span>
  </div>

</div>

<!-- Gaze cursor: dot + SVG dwell-progress ring -->
<div id="gaze-cursor">
  <!-- Ring drawn as an SVG arc that fills clockwise during dwell -->
  <svg id="dwell-svg" viewBox="-22 -22 44 44" width="44" height="44"
       style="position:absolute; transform:translate(-50%,-50%);">
    <!-- Background track -->
    <circle r="18" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
    <!-- Progress arc (stroke-dasharray updated by JS) -->
    <circle id="dwell-ring" r="18" fill="none"
            stroke="#f39c12" stroke-width="3"
            stroke-linecap="round"
            stroke-dasharray="0 113.1"
            transform="rotate(-90)"/>
  </svg>
  <div id="gaze-dot"></div>
</div>

<script src="src/calibration/calibration.js"></script>
<script src="src/barchart/barchart.js"></script>
<script src="src/linechart/linechart.js"></script>
<script>
  // ── Calibration score ────────────────────────────────────────────────────────
  (function () {
    try {
      const stored = JSON.parse(localStorage.getItem('webgaze_calibration') || 'null');
      if (stored && stored.meanError != null) {
        const ok = stored.meanError <= 250;
        document.getElementById('cal-score').innerHTML =
          `Dernière calibration : <span style="color:${ok ? '#27ae60' : '#e74c3c'}">${stored.meanError.toFixed(1)} px</span>`;
      } else {
        document.getElementById('cal-score').textContent = 'Aucune calibration — calibrez avant de tester.';
      }
    } catch (_) {}
  })();

  // ── Active chart reference ────────────────────────────────────────────────────
  let _activeChart = BarChart;

  // ── Tab switching ────────────────────────────────────────────────────────────
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');

      _resetDwell();

      if (btn.dataset.tab === 'tab-barchart') {
        LineChart.setGazeMode(false);
        BarChart.init('bar-chart-container');
        if (_gazeModeOn) BarChart.setGazeMode(true);
        _activeChart = BarChart;
      } else if (btn.dataset.tab === 'tab-linechart') {
        BarChart.setGazeMode(false);
        LineChart.init('line-chart-container');
        if (_gazeModeOn) LineChart.setGazeMode(true);
        _activeChart = LineChart;
      } else {
        BarChart.setGazeMode(false);
        LineChart.setGazeMode(false);
        _activeChart = null;
      }
    });
  });

  // ── Initial render ────────────────────────────────────────────────────────────
  BarChart.init('bar-chart-container');

  // ── Gaze cursor elements ─────────────────────────────────────────────────────
  const gazeCursor = document.getElementById('gaze-cursor');
  const dwellRing  = document.getElementById('dwell-ring');
  const RING_CIRC  = 2 * Math.PI * 18; // ≈ 113.1 px

  function _setDwellRing(progress) {
    const filled = Math.min(progress, 1) * RING_CIRC;
    dwellRing.setAttribute('stroke-dasharray', `${filled.toFixed(1)} ${RING_CIRC.toFixed(1)}`);
    dwellRing.style.opacity = progress > 0 ? '1' : '0';
  }

  // ── Dwell state machine ──────────────────────────────────────────────────────
  const DWELL_MS = 700;  // ms de regard pour déclencher le hover
  const GRACE_MS = 180;  // tolérance si le regard sort brièvement d'une zone

  let _dwell = {
    aoiId:      null,   // id de la zone regardée
    startedAt:  null,
    hovering:   false,
    graceTimer: null,
  };

  function _onGazeAOIEnter(aoiId) {
    if (_dwell.graceTimer) { clearTimeout(_dwell.graceTimer); _dwell.graceTimer = null; }
    if (_dwell.aoiId === aoiId) return;
    _resetDwell();
    _dwell.aoiId = aoiId;
    _dwell.startedAt = Date.now();
  }

  function _onGazeAOILeave() {
    if (!_dwell.aoiId) return;
    _dwell.graceTimer = setTimeout(() => _resetDwell(), GRACE_MS);
  }

  function _resetDwell() {
    if (_dwell.graceTimer) { clearTimeout(_dwell.graceTimer); _dwell.graceTimer = null; }
    if (_activeChart) {
      if (_dwell.hovering) _activeChart.gazeLeave();
      _activeChart.gazeDwelling(null, 0);
    }
    _setDwellRing(0);
    _dwell = { aoiId: null, startedAt: null, hovering: false, graceTimer: null };
  }

  function _tickDwell(x, y) {
    if (!_dwell.aoiId || !_activeChart) return;
    const elapsed  = Date.now() - _dwell.startedAt;
    const progress = Math.min(elapsed / DWELL_MS, 1);
    _setDwellRing(progress);

    if (!_dwell.hovering) {
      _activeChart.gazeDwelling(_dwell.aoiId, progress);
    }
    if (!_dwell.hovering && elapsed >= DWELL_MS) {
      _activeChart.gazeHover(_dwell.aoiId, x, y);
      _dwell.hovering = true;
    } else if (_dwell.hovering) {
      _activeChart.gazeHover(_dwell.aoiId, x, y);
    }
  }

  // ── Interactive AOI prefixes per chart ───────────────────────────────────────
  function _getInteractiveAOIs() {
    if (!_activeChart) return [];
    if (_activeChart === BarChart)   return BarChart.getAOIs().filter(a => a.id.startsWith('bar-'));
    if (_activeChart === LineChart)  return LineChart.getAOIs().filter(a => a.id.startsWith('col-'));
    return [];
  }

  // ── WebGazer setup ───────────────────────────────────────────────────────────
  let _wgStarted  = false;
  let _gazeModeOn = false;

  const statusEl = document.getElementById('webcam-status');

  let _lastGaze = null;

  function _gazeListener(data) {
    if (!data) {
      // Pas de prédiction — garder la dernière position visible
      if (_lastGaze) {
        gazeCursor.style.left = _lastGaze.x + 'px';
        gazeCursor.style.top  = _lastGaze.y + 'px';
      }
      return;
    }
    const corrected = Calibration.applyBiasCorrection(data.x, data.y);
    const x = corrected.x;
    const y = corrected.y;

    _lastGaze = { x, y };
    gazeCursor.style.left = x + 'px';
    gazeCursor.style.top  = y + 'px';

    const aois = _getInteractiveAOIs();
    const hit  = aois.find(a => x >= a.x && x <= a.x + a.width && y >= a.y && y <= a.y + a.height);
    if (hit) _onGazeAOIEnter(hit.id); else _onGazeAOILeave();
    _tickDwell(x, y);
  }

  async function _startGaze() {
    document.getElementById('btn-start').disabled = true;
    statusEl.textContent = '● Chargement webcam…';
    statusEl.style.color = '#f0a500';

    try {
      // Charger le profil de calibration (IDW nodes + biais) depuis localStorage
      Calibration.loadProfile();

      if (!_wgStarted) {
        webgazer.saveDataAcrossSessions(true);
        // showVideo(true) AVANT begin() — FaceMesh a besoin du flux vidéo actif
        webgazer.showVideo(true).showFaceOverlay(true).showFaceFeedbackBox(true);
        await webgazer.setRegression('ridge').setTracker('TFFacemesh').begin();
        webgazer.applyKalmanFilter(true);
        webgazer.removeMouseEventListeners();
        _wgStarted = true;
      } else {
        webgazer.resume();
        webgazer.showVideo(true).showFaceOverlay(true).showFaceFeedbackBox(true);
        webgazer.removeMouseEventListeners();
      }

      // Réinjecter les données d'entraînement depuis localStorage
      // (IndexedDB via saveDataAcrossSessions n'est pas fiable entre pages)
      Calibration.restoreTrainingData();

      webgazer.setGazeListener(_gazeListener);
      gazeCursor.style.display = 'block';
      _gazeModeOn = true;
      if (_activeChart) _activeChart.setGazeMode(true);

      statusEl.textContent = '● Webcam active';
      statusEl.style.color = '#27ae60';
      document.getElementById('btn-stop').disabled = false;

    } catch (err) {
      statusEl.textContent = '● Erreur : ' + (err.message || err);
      statusEl.style.color = '#e74c3c';
      document.getElementById('btn-start').disabled = false;
    }
  }

  document.getElementById('btn-start').addEventListener('click', _startGaze);

  document.getElementById('btn-stop').addEventListener('click', function () {
    webgazer.clearGazeListener();
    webgazer.pause();
    gazeCursor.style.display = 'none';
    _resetDwell();
    _gazeModeOn = false;
    BarChart.setGazeMode(false);
    LineChart.setGazeMode(false);

    statusEl.textContent = '● Webcam inactive';
    statusEl.style.color = '#f0a500';
    document.getElementById('btn-start').disabled = false;
    this.disabled = true;
  });

  // Démarrage automatique si on vient de la calibration
  window.addEventListener('load', function () {
    if (typeof webgazer === 'undefined') return;
    const stored = Calibration.getStoredData();
    if (stored && stored.meanError != null) {
      _startGaze();
    }
  });

  // ── Calibrate shortcut ───────────────────────────────────────────────────────
  document.getElementById('btn-calibrate').addEventListener('click', () => {
    if (_wgStarted) { try { webgazer.pause(); } catch (_) {} }
    window.location.href = 'calibration.html';
  });

  // ── AOI debug ────────────────────────────────────────────────────────────────
  document.getElementById('btn-aois').addEventListener('click', () => {
    const chart = _activeChart || BarChart;
    const aois  = chart.getAOIs();
    console.table(aois);
    alert(`${aois.length} AOI — voir console (F12).`);
  });
</script>
</body>
</html>
