<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGaze — Moteur WebGazer</title>

  <!-- Patch DPI Windows avant tout (cohérence coordonnées CSS / WebGazer) -->
  <script>
    (function () {
      if (window.screen.width === window.innerWidth) return;
      try {
        Object.defineProperty(window, 'screen', {
          get: function () {
            return { width: window.innerWidth, height: window.innerHeight,
                     availWidth: window.innerWidth, availHeight: window.innerHeight,
                     colorDepth: 24, pixelDepth: 24 };
          }
        });
      } catch (_) {}
    })();
  </script>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.min.js"
          crossorigin="anonymous"></script>

  <link rel="stylesheet" href="src/barchart/barchart.css" />
  <link rel="stylesheet" href="src/linechart/linechart.css" />
  <link rel="stylesheet" href="src/scatterchart/scatterchart.css" />
  <link rel="stylesheet" href="src/participant-form/participant-form.css" />
  <link rel="stylesheet" href="src/gaze-capture/gaze-capture.css" />
  <link rel="stylesheet" href="src/test-scenario/test-scenario.css" />
  <link rel="stylesheet" href="src/gaze-viz/gaze-viz.css" />
  <link rel="stylesheet" href="src/results-view/results-view.css" />

  <style>
    :root {
      --bg:      #000;
      --surface: #0d0d0d;
      --accent:  #3B82F6;
      --text:    #F0F0F0;
      --muted:   #9CA3AF;
      --border:  #1F2937;
    }
    *, *::before, *::after { box-sizing: border-box; }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    input, textarea, select { -webkit-user-select: text; user-select: text; }

    header {
      padding: 14px 22px; display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.1rem; margin: 0; font-weight: 700; }
    .engine-badge {
      font-size: .75rem;
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.25);
      color: var(--accent);
      padding: 3px 10px; border-radius: 999px; font-weight: 700;
    }
    header a {
      margin-left: auto; color: var(--muted);
      font-size: .85rem; text-decoration: none;
    }
    header a:hover { color: var(--text); }

    /* ── Barre d'actions ────────────────────────────────────────────────────── */
    .bar {
      display: flex; gap: 10px; align-items: center; padding: 12px 22px;
      flex-wrap: wrap; border-bottom: 1px solid var(--border);
    }
    button {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 9px 16px; font-size: .9rem; cursor: pointer; font-weight: 700;
      font-family: inherit; transition: opacity .15s;
    }
    button:hover:not(:disabled) { opacity: .88; }
    button.ghost {
      background: transparent; border: 1px solid var(--border); color: var(--text);
    }
    button:disabled { opacity: .35; cursor: not-allowed; }
    #status { font-size: .85rem; color: var(--muted); margin-left: 8px; }

    /* ── Navigation graphiques ──────────────────────────────────────────────── */
    #demo-nav { display: flex; gap: 8px; padding: 14px 22px 0; }
    #demo-nav button {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-weight: 600;
    }
    #demo-nav button.active {
      background: var(--accent); color: #000; border-color: transparent;
    }
    #demo-nav button:hover:not(.active) { color: var(--text); border-color: var(--accent); }

    .chart-area { padding: 18px 22px; min-height: 60vh; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Curseur regard ─────────────────────────────────────────────────────── */
    #gaze-cursor {
      position: fixed; width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--accent); background: rgba(59,130,246,.12);
      transform: translate(-50%,-50%); pointer-events: none; z-index: 9000; display: none;
    }

    /* ── Widget retour environnement ────────────────────────────────────────── */
    #face-widget {
      position: fixed; bottom: 14px; right: 14px; z-index: 9600; width: 200px;
      background: #0d0d0d; border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: .78rem; color: var(--text);
    }
    #face-widget .fw-row { display: flex; justify-content: space-between; margin: 3px 0; }
    #face-widget .fw-dot {
      width: 9px; height: 9px; border-radius: 50%;
      display: inline-block; margin-right: 6px; background: #374151;
    }
    #face-widget .fw-title {
      font-weight: 700; color: var(--muted); margin-bottom: 6px;
      font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
    }

    /* ── Vidéo WebGazer ─────────────────────────────────────────────────────── */
    #webgazerVideoContainer {
      position: fixed !important;
      bottom: 14px !important; left: 14px !important;
      top: auto !important; right: auto !important;
      width: 160px !important; height: 120px !important;
      border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
      z-index: 9100;
    }
    #webgazerVideoFeed { width: 160px !important; height: 120px !important; }
    #webgazerFaceOverlay, #webgazerFaceFeedbackBox {
      width: 160px !important; height: 120px !important;
    }

    /* ── Positionnement ─────────────────────────────────────────────────────── */
    .wg-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 9999;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; font-family: inherit; gap: 16px;
    }
    .wg-pos-title {
      margin: 0; color: var(--text); font-size: 1.1rem;
      font-weight: 700; text-align: center;
    }
    .wg-pos-hint {
      color: var(--muted); margin: 0; line-height: 1.65; font-size: .88rem;
      text-align: center; max-width: 360px;
    }
    .wg-pos-video-wrap { position: relative; width: 320px; height: 240px; }
    .wg-pos-oval {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 130px; height: 170px; border-radius: 50%;
      border: 2px dashed #374151; pointer-events: none;
      transition: border-color .3s, box-shadow .3s;
    }
    .wg-pos-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 12px 26px; font-weight: 700;
      cursor: pointer; font-size: .95rem; font-family: inherit;
    }

    /* ── Vérification libre ─────────────────────────────────────────────────── */
    .wg-freelook-box {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10006; background: #0d0d0d;
      border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 22px; color: var(--text); text-align: center;
      font-size: .9rem; line-height: 1.7; font-family: inherit;
    }
    .wg-freelook-title  { color: var(--text); font-weight: 700; margin-bottom: 5px; }
    .wg-freelook-accent { color: var(--accent); }
    .wg-freelook-ok {
      margin-top: 10px; background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 9px 18px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .wg-freelook-recal {
      margin-top: 10px; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 18px; cursor: pointer; font-family: inherit;
    }
    .wg-freelook-recal:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>WebGaze Activity Tracker</h1>
  <span class="engine-badge">Moteur : WebGazer.js</span>
  <a href="choose.html">← Changer de moteur</a>
</header>

<div class="bar">
  <button id="btn-calibrate">1 · Calibrer</button>
  <button id="btn-export" class="ghost" disabled>Export JSON + JSON-LD + CSV</button>
  <span id="status">Prêt — cliquez « Calibrer ».</span>
</div>

<nav id="demo-nav">
  <button class="active" data-tab="tab-barchart">Bar Chart</button>
  <button data-tab="tab-linechart">Line Chart</button>
  <button data-tab="tab-scatter">Scatter Plot</button>
</nav>
<div class="chart-area">
  <div id="tab-barchart" class="tab-panel active"><div id="bar-chart-container"></div></div>
  <div id="tab-linechart" class="tab-panel"><div id="line-chart-container"></div></div>
  <div id="tab-scatter"   class="tab-panel"><div id="scatter-chart-container"></div></div>
</div>

<div id="gaze-cursor"></div>

<div id="face-widget">
  <div class="fw-title">Retour environnement</div>
  <div class="fw-row">
    <span><span class="fw-dot" id="fw-cam-dot"></span>Webcam</span>
    <span id="fw-cam">—</span>
  </div>
  <div class="fw-row">
    <span><span class="fw-dot" id="fw-lux-dot"></span>Luminosité</span>
    <span id="fw-lux">—</span>
  </div>
</div>

<!-- Gabarit du formulaire participant (hydraté dynamiquement par participant-form.js) -->
<template id="pf-modal">
  <div id="pf-overlay">
    <div class="pf-card">
      <h3 class="pf-title">
        <span class="pf-title-text">Informations participant</span>
        <span class="pf-engine-badge"></span>
      </h3>
      <p class="pf-hint">Notez votre identifiant avant de continuer — il sera utilisé pour retrouver vos données.</p>
      <div class="pf-id-box">
        <div class="pf-id-label">Votre identifiant</div>
        <div id="pf-id-display"></div>
      </div>
      <div class="pf-field">
        <label class="pf-label" for="pf-glasses">Correction visuelle</label>
        <select id="pf-glasses" class="pf-select">
          <option value="non">Aucune</option>
          <option value="lunettes">Lunettes</option>
          <option value="lentilles">Lentilles</option>
        </select>
      </div>
      <div class="pf-field pf-field--last">
        <label class="pf-label" for="pf-lighting">
          Luminosité ambiante
          <span class="pf-lux-note"></span>
        </label>
        <select id="pf-lighting" class="pf-select">
          <option value="faible">Faible — store fermé / lampe de bureau</option>
          <option value="normale" selected>Normale — bureau éclairé</option>
          <option value="forte">Forte — lumière naturelle directe</option>
        </select>
      </div>
      <button id="pf-go" class="pf-submit">Commencer →</button>
    </div>
  </div>
</template>

<script src="src/calibration/calibration.js?v=wg"></script>
<script src="src/participant-form/participant-form.js?v=1"></script>
<script src="src/logger/gaze-logger.js?v=3"></script>
<script src="src/session-store/session-store.js?v=3"></script>
<script src="src/gaze-viz/gaze-viz.js?v=3"></script>
<script src="src/results-view/results-view.js?v=3"></script>
<script src="src/test-scenario/test-scenario.js?v=3"></script>
<script src="src/ambient-light/ambient-light.js?v=3"></script>
<script src="src/barchart/barchart.js?v=3"></script>
<script src="src/linechart/linechart.js?v=3"></script>
<script src="src/scatterchart/scatterchart.js?v=3"></script>

<script>
(function () {
  'use strict';

  var statusEl    = document.getElementById('status');
  var cursor      = document.getElementById('gaze-cursor');

  var _wgStarted   = false;
  var _gazeOn      = false;
  var _gazeLastMs  = 0;
  var _session     = null;
  var _activeChart = null;
  var _previewListener = null;

  function setStatus(txt, color) {
    statusEl.textContent = txt;
    statusEl.style.color = color || '#9CA3AF';
  }

  // ── Graphiques ───────────────────────────────────────────────────────────────
  BarChart.init('bar-chart-container');
  _activeChart = BarChart;

  document.querySelectorAll('#demo-nav button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('#demo-nav button').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      if (GazeLogger.isInitialized()) GazeLogger.logInteraction('tab_change', { tab: btn.dataset.tab });
      [BarChart, LineChart, ScatterChart].forEach(function (c) { c.setGazeMode(false); });
      if (btn.dataset.tab === 'tab-barchart')  { BarChart.init('bar-chart-container');     _activeChart = BarChart; }
      else if (btn.dataset.tab === 'tab-linechart') { LineChart.init('line-chart-container'); _activeChart = LineChart; }
      else { ScatterChart.init('scatter-chart-container'); _activeChart = ScatterChart; }
      if (_gazeOn) _activeChart.setGazeMode(true);
      if (GazeLogger.isInitialized()) GazeLogger.logVizState(_currentVizState());
    });
  });

  // ── Widget retour environnement ──────────────────────────────────────────────
  setInterval(function () {
    var gazeRecent = _gazeOn && (Date.now() - _gazeLastMs < 2000);
    document.getElementById('fw-cam').textContent =
      !_wgStarted ? 'inactive' : gazeRecent ? 'suivi actif' : 'caméra active';
    document.getElementById('fw-cam-dot').style.background =
      !_wgStarted ? '#374151' : gazeRecent ? '#3B82F6' : '#60A5FA';
    var lux = AmbientLight.getLux();
    var luxOk = lux != null && lux >= 80 && lux <= 700;
    document.getElementById('fw-lux').textContent = lux != null ? lux + ' lux' : '—';
    document.getElementById('fw-lux-dot').style.background = lux == null ? '#374151' : luxOk ? '#3B82F6' : '#9CA3AF';
  }, 800);

  // ── Calibrer ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-calibrate').addEventListener('click', function () {
    var _lux = (window.AmbientLight && typeof AmbientLight.getLux === 'function') ? AmbientLight.getLux() : null;
    ParticipantForm.show({
      accentColor: '#3B82F6',
      engine: 'webgazer',
      lux: _lux,
      onDone: function (sessionData) {
        _session = sessionData;
        _startEngineThenCalibrate();
      },
    });
  });

  async function _startEngineThenCalibrate() {
    if (!_wgStarted) {
      setStatus('Démarrage de la caméra WebGazer…', '#9CA3AF');
      try {
        webgazer.saveDataAcrossSessions(false);
        webgazer.showVideo(true).showFaceOverlay(true).showFaceFeedbackBox(true);
        await webgazer.setRegression('ridge').setTracker('TFFacemesh').begin();
        webgazer.applyKalmanFilter(true);
        webgazer.removeMouseEventListeners();
        _wgStarted = true;
        AmbientLight.start();
      } catch (err) {
        setStatus('Erreur caméra : ' + (err.message || String(err)), '#F0F0F0');
        return;
      }
    }
    _showPositioning();
  }

  // ── Positionnement ───────────────────────────────────────────────────────────
  function _showPositioning() {
    var wgCnt = document.getElementById('webgazerVideoContainer');

    // Agrandir et centrer le container vidéo WebGazer pour le positionnement
    var _origStyle = wgCnt ? wgCnt.getAttribute('style') || '' : '';
    if (wgCnt) {
      wgCnt.style.cssText =
        'position:fixed !important; width:320px !important; height:240px !important;'
        + 'left:50% !important; top:50% !important; bottom:auto !important; right:auto !important;'
        + 'transform:translate(-50%,-50%) !important;'
        + 'border-radius:8px; border:1px solid #1F2937; z-index:10000;';
      // Agrandir aussi le feed vidéo interne
      ['webgazerVideoFeed','webgazerFaceOverlay','webgazerFaceFeedbackBox'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) { el.style.width = '320px'; el.style.height = '240px'; }
      });
    }

    var overlay = document.createElement('div');
    overlay.classList.add('wg-modal-overlay');

    // Ovale guide par-dessus la vidéo (affiché en position fixe centrée)
    var ovalWrap = document.createElement('div');
    ovalWrap.className = 'wg-pos-video-wrap';
    var oval = document.createElement('div');
    oval.className = 'wg-pos-oval';
    ovalWrap.appendChild(oval);

    var h3 = document.createElement('h3');
    h3.className = 'wg-pos-title';
    h3.textContent = 'Positionnement';

    var p = document.createElement('p');
    p.className = 'wg-pos-hint';
    p.innerHTML =
      'Placez-vous à <strong>~60 cm</strong> de l\'écran, visage centré dans l\'ovale.<br>'
      + 'L\'ovale devient vert quand WebGazer détecte bien votre visage.';

    var goBtn = document.createElement('button');
    goBtn.id = 'pos-go';
    goBtn.className = 'wg-pos-btn';
    goBtn.textContent = 'Je suis prêt — Calibrer →';

    overlay.appendChild(h3);
    overlay.appendChild(ovalWrap);   // l'ovale flotte sur la vidéo WebGazer en dessous
    overlay.appendChild(p);
    overlay.appendChild(goBtn);
    document.body.appendChild(overlay);

    // Colorer l'ovale selon la détection WebGazer
    var _ovalIv = setInterval(function () {
      var gazeRecent = _gazeOn && (Date.now() - _gazeLastMs < 1500);
      oval.style.borderColor = gazeRecent ? '#3B82F6' : '#374151';
      oval.style.boxShadow   = gazeRecent ? '0 0 12px 4px rgba(59,130,246,.4)' : '';
    }, 400);

    goBtn.addEventListener('click', function () {
      clearInterval(_ovalIv);
      overlay.remove();
      // Remettre le container vidéo en bas-gauche (taille normale)
      if (wgCnt) {
        wgCnt.style.cssText = _origStyle
          + 'position:fixed !important; bottom:14px !important; left:14px !important;'
          + 'top:auto !important; right:auto !important; transform:none !important;'
          + 'width:160px !important; height:120px !important;'
          + 'border-radius:8px; border:2px solid rgba(78,205,196,.45);';
        ['webgazerVideoFeed','webgazerFaceOverlay','webgazerFaceFeedbackBox'].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) { el.style.width = '160px'; el.style.height = '120px'; }
        });
      }
      _runCalibration();
    });
  }

  // ── Calibration ──────────────────────────────────────────────────────────────
  function _runCalibration() {
    // Pré-remplir sessionStorage pour que calibration.js saute son propre formulaire
    if (_session) {
      try {
        sessionStorage.setItem('calibration_session', JSON.stringify({
          participant_id:    _session.participant_id,
          date:              _session.date,
          glasses:           _session.glasses,
          lighting:          _session.lighting,
          screen_resolution: _session.screen_resolution,
          age: null, gender: null, browser: null,
        }));
      } catch (_) {}
    }
    setStatus('Calibration en cours — suivez les instructions à l\'écran…', '#3B82F6');
    Calibration.start(function (score) {
      var ok = score.meanError <= 250;
      setStatus(
        (ok ? '✓ Calibration OK' : '⚠️ Calibration limite')
        + ' — ' + score.meanError.toFixed(0) + ' ± ' + (score.stdError || 0).toFixed(0) + ' px',
        ok ? '#3B82F6' : '#9CA3AF'
      );
      _showFreeLookCheck(score);
    }, { alreadyStarted: _wgStarted });
  }

  // ── Vérification libre avant le test ─────────────────────────────────────────
  function _showFreeLookCheck(score) {
    Calibration.resetSmoothing();
    _previewListener = function (data) {
      if (!data) return;
      var c = Calibration.smoothPrediction(data.x, data.y, Date.now());
      if (!c) return;
      cursor.style.display = 'block';
      cursor.style.left = c.x + 'px'; cursor.style.top = c.y + 'px';
    };
    webgazer.setGazeListener(_previewListener);
    cursor.style.display = 'block';

    var box = document.createElement('div');
    box.id = 'wg-freelook';
    box.className = 'wg-freelook-box';

    var titleEl = document.createElement('div');
    titleEl.className = 'wg-freelook-title';
    titleEl.textContent = 'Vérification du regard';
    box.appendChild(titleEl);

    box.appendChild(document.createTextNode('Le '));
    var accentSpan = document.createElement('span');
    accentSpan.className = 'wg-freelook-accent';
    accentSpan.textContent = 'point vert';
    box.appendChild(accentSpan);
    box.appendChild(document.createTextNode(
      ' suit votre regard. Promenez les yeux à l\'écran : il doit vous suivre.'
    ));
    box.appendChild(document.createElement('br'));

    var okBtn = document.createElement('button');
    okBtn.id = 'wg-freelook-ok';
    okBtn.className = 'wg-freelook-ok';
    okBtn.textContent = 'C\'est bon — Lancer le test →';
    box.appendChild(okBtn);

    box.appendChild(document.createTextNode(' '));

    var recalBtn = document.createElement('button');
    recalBtn.id = 'wg-freelook-recal';
    recalBtn.className = 'wg-freelook-recal';
    recalBtn.textContent = 'Recalibrer';
    box.appendChild(recalBtn);

    document.body.appendChild(box);

    document.getElementById('wg-freelook-ok').addEventListener('click', function () {
      _stopPreview(); box.remove(); _startTestScenario(score);
    });
    document.getElementById('wg-freelook-recal').addEventListener('click', function () {
      _stopPreview(); box.remove();
      Calibration.reset();
      try { webgazer.clearData(); } catch (_) {}
      _runCalibration();
    });
  }

  function _stopPreview() {
    if (_previewListener) { try { webgazer.clearGazeListener(); } catch (_) {} _previewListener = null; }
    cursor.style.display = 'none';
  }

  // ── Scénario de test ─────────────────────────────────────────────────────────
  function _startTestScenario(score) {
    var pid = (_session && _session.participant_id) || 'participant-wg';
    GazeLogger.init(pid, { mean_error_px: score.meanError, std_error_px: score.stdError || null }, {
      glasses:      _session && _session.glasses,
      lighting:     _session && _session.lighting,
      lux_measured: _session && _session.lux_measured,
      engine:       'webgazer',
    });
    GazeLogger.setModule('webgazer');
    GazeLogger.logInteraction('test_session_start', { participant: _session || null });

    Calibration.loadProfile();
    Calibration.resetSmoothing();
    setTimeout(function () { Calibration.captureHeadReference(); }, 1500);

    webgazer.setGazeListener(_gazeListener);
    _gazeOn = true;
    cursor.style.display = 'block';
    if (_activeChart) _activeChart.setGazeMode(true);

    TestScenario.run({
      amorceMs: 3000, exploreMs: 15000, targetsPerPage: 3,
      pages: [
        { id: 'tab-bar',     label: 'Bar Chart',    activate: function () { _switchTab('tab-barchart'); }, getAOIs: function () { return BarChart.getAOIs(); } },
        { id: 'tab-line',    label: 'Line Chart',   activate: function () { _switchTab('tab-linechart'); }, getAOIs: function () { return LineChart.getAOIs(); } },
        { id: 'tab-scatter', label: 'Scatter Plot', activate: function () { _switchTab('tab-scatter'); },   getAOIs: function () { return ScatterChart.getAOIs(); } },
      ],
      onPhase: function (phase, info) {
        if (phase === 'amorce') GazeLogger.setTestContext(info.test_case_id, info.aoi ? info.aoi.id : null, info.target_x, info.target_y);
        else if (phase === 'free') GazeLogger.setTestContext(info.test_case_id, null);
        if (phase !== 'page' && GazeLogger.isInitialized())
          GazeLogger.logInteraction('stimulus_shown', { phase: phase, test_case_id: info.test_case_id, aoi: info.aoi ? info.aoi.id : null });
      },
      onProgress: function (t) { setStatus(t, '#3B82F6'); },
      onDone: _finishTestScenario,
    });
  }

  function _switchTab(tabId) {
    var btn = document.querySelector('#demo-nav button[data-tab="' + tabId + '"]');
    if (btn) btn.click();
  }

  function _finishTestScenario() {
    GazeLogger.clearTestContext();
    try { webgazer.clearGazeListener(); } catch (_) {}
    _gazeOn = false;
    cursor.style.display = 'none';
    _resetDwell();
    [BarChart, LineChart, ScatterChart].forEach(function (c) { if (c.setGazeMode) c.setGazeMode(false); });

    var raw = GazeLogger.export().raw_gaze_data;
    if (raw.length >= 10) {
      Calibration.detectFixations(raw, 80, 100).forEach(function (f) {
        GazeLogger.logEvent({ type: 'fixation', start_time: f.start_time, end_time: f.end_time,
          duration: f.duration, details: { x: f.x_center, y: f.y_center, points_count: f.points_count } });
      });
      Calibration.detectSaccades(raw, 0.7).forEach(function (s) {
        GazeLogger.logEvent({ type: 'saccade', start_time: s.start_time, end_time: s.end_time,
          duration: s.duration, details: { amplitude: s.amplitude, peak_velocity: s.peak_velocity } });
      });
      var allAOIs = BarChart.getAOIs().concat(LineChart.getAOIs(), ScatterChart.getAOIs());
      Calibration.detectFixations(raw, 80, 100).forEach(function (f, i) {
        var hit = allAOIs.find(function (a) {
          return f.x_center >= a.x && f.x_center <= a.x + a.width &&
                 f.y_center >= a.y && f.y_center <= a.y + a.height;
        });
        if (hit) GazeLogger.logAOIHit(hit.id, hit.label || '', i, f.start_time, {
          source_module: 'post_processing', viz_state: _currentVizState(),
        });
      });
    }

    GazeLogger.logInteraction('test_session_end', {});
    var data = GazeLogger.export();
    SessionStore.save(data);
    try { GazeLogger.download(); } catch (_) {}
    setStatus('Test terminé — session enregistrée.', '#3B82F6');
    document.getElementById('btn-export').disabled = false;
    ResultsView.show(data);
    ResultsView.showButton(data);
  }

  // ── Gaze listener ────────────────────────────────────────────────────────────
  function _gazeListener(data) {
    if (!data) return;
    _gazeLastMs = Date.now();
    var c = Calibration.smoothPrediction(data.x, data.y, _gazeLastMs);
    if (!c) return;
    cursor.style.display = 'block';
    cursor.style.left = c.x + 'px'; cursor.style.top = c.y + 'px';
    var conf = _wgConfidence(data);
    if (typeof GazeLogger.confidenceColor === 'function')
      cursor.style.borderColor = GazeLogger.confidenceColor(conf);
    if (GazeLogger.isInitialized()) {
      GazeLogger.logRawPoint(c.x, c.y, _gazeLastMs, {
        confidence: conf, source_module: 'webgazer',
        raw_x: data.x, raw_y: data.y,
        dom: _domUnderGaze(c.x, c.y), viz_state: _currentVizState(),
      });
    }
    var aois = _getInteractiveAOIs();
    var hit  = aois.find(function (a) {
      return c.x >= a.x && c.x <= a.x + a.width && c.y >= a.y && c.y <= a.y + a.height;
    });
    if (hit) _onAOIEnter(hit.id, c.x, c.y); else _onAOILeave();
    _tickDwell(c.x, c.y);
  }

  function _wgConfidence(data) {
    try {
      var regs = webgazer.getRegression ? webgazer.getRegression() : null;
      if (regs && regs[0] && typeof regs[0].getConfidence === 'function') {
        var c = regs[0].getConfidence();
        if (typeof c === 'number' && isFinite(c)) return Math.max(0, Math.min(1, c));
      }
    } catch (_) {}
    try {
      var ef = data && data.eyeFeatures;
      if (ef && ef.left && ef.right)
        return Math.max(0, 1 - (ef.left.blink ? 0.4 : 0) - (ef.right.blink ? 0.4 : 0));
    } catch (_) {}
    return data ? 0.5 : 0;
  }

  // ── Dwell ────────────────────────────────────────────────────────────────────
  var DWELL_MS = 700, GRACE_MS = 250;
  var _dwell = { aoiId: null, startedAt: null, graceTimer: null };

  function _getInteractiveAOIs() {
    if (!_activeChart) return [];
    if (_activeChart === BarChart)     return BarChart.getAOIs().filter(function (a) { return a.id.indexOf('bar-') === 0; });
    if (_activeChart === LineChart)    return LineChart.getAOIs().filter(function (a) { return a.id.indexOf('col-') === 0; });
    if (_activeChart === ScatterChart) return ScatterChart.getAOIs().filter(function (a) { return a.id.indexOf('point-') === 0; });
    return [];
  }
  function _resetDwell() {
    if (_dwell.graceTimer) { clearTimeout(_dwell.graceTimer); _dwell.graceTimer = null; }
    if (_activeChart) { _activeChart.gazeLeave(); _activeChart.gazeDwelling(null, 0); }
    _dwell = { aoiId: null, startedAt: null, graceTimer: null };
  }
  function _onAOIEnter(aoiId, x, y) {
    if (_dwell.graceTimer) { clearTimeout(_dwell.graceTimer); _dwell.graceTimer = null; }
    if (_dwell.aoiId === aoiId) return;
    _resetDwell();
    _dwell.aoiId = aoiId; _dwell.startedAt = Date.now();
    if (GazeLogger.isInitialized())
      GazeLogger.logInteraction('gaze_enter_aoi', { aoi_id: aoiId, x: Math.round(x), y: Math.round(y) });
    if (_activeChart) _activeChart.gazeHover(aoiId, x, y);
  }
  function _onAOILeave() {
    if (!_dwell.aoiId) return;
    _dwell.graceTimer = setTimeout(_resetDwell, GRACE_MS);
  }
  function _tickDwell(x, y) {
    if (!_dwell.aoiId || !_activeChart) return;
    var progress = Math.min((Date.now() - _dwell.startedAt) / DWELL_MS, 1);
    _activeChart.gazeDwelling(_dwell.aoiId, progress);
    _activeChart.gazeHover(_dwell.aoiId, x, y);
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function _currentVizState() {
    var view = _activeChart === LineChart ? 'line'
             : _activeChart === ScatterChart ? 'scatter' : 'bar';
    var ds = view === 'bar' ? 'ventes_trimestrielles'
           : view === 'line' ? 'temperatures_villes' : 'pays_indicateurs';
    var cs = (_activeChart && typeof _activeChart.getState === 'function') ? _activeChart.getState() : null;
    return { active_view: view, dataset: ds, gaze_mode: _gazeOn,
             current_aoi: _dwell ? _dwell.aoiId : null,
             zoom: cs ? cs.zoom : 1, filters: cs ? cs.hidden_quarters : [],
             n_aois: _getInteractiveAOIs().length,
             viewport: { width: window.innerWidth, height: window.innerHeight } };
  }
  function _domUnderGaze(x, y) {
    try { var el = document.elementFromPoint(x, y); return el ? GazeLogger.describeDom(el) : null; }
    catch (_) { return null; }
  }

  // ── Export ───────────────────────────────────────────────────────────────────
  document.getElementById('btn-export').addEventListener('click', function () {
    if (!GazeLogger.isInitialized()) return;
    GazeLogger.logInteraction('export', { formats: ['json', 'jsonld', 'csv'], engine: 'webgazer' });
    GazeLogger.download();
    GazeLogger.downloadJsonLd();
    GazeLogger.downloadCsv();
  });

  // ── Profil mémorisé ──────────────────────────────────────────────────────────
  (function () {
    var stored = Calibration.getStoredData();
    if (stored) {
      var when = stored.timestamp ? stored.timestamp.slice(0, 10) : '';
      setStatus(
        'Profil du ' + when + ' (' + Math.round(stored.meanError) + ' px). '
        + 'Cliquez « Calibrer » pour refaire.',
        '#9CA3AF'
      );
    }
  })();

})();
</script>
</body>
</html>
